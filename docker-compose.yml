services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: who-that-postgres
    ports:
      - "54322:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-who_that}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-who_that_dev}
      POSTGRES_DB: ${POSTGRES_DB:-who_that}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-who_that} -d ${POSTGRES_DB:-who_that}"]
      interval: 2s
      timeout: 2s
      retries: 10

volumes:
  postgres_data:
