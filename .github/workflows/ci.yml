name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: who_that
          POSTGRES_PASSWORD: who_that_dev
          POSTGRES_DB: who_that
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U who_that -d who_that"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://who_that:who_that_dev@localhost:5432/who_that
      TEST_DATABASE_URL: postgresql://who_that:who_that_dev@localhost:5432/who_that_test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Create test database
        run: PGPASSWORD=who_that_dev psql -h localhost -U who_that -d postgres -c "CREATE DATABASE who_that_test;"

      - run: npm ci

      - run: npm run check

      - run: npm test

  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: who_that
          POSTGRES_PASSWORD: who_that_dev
          POSTGRES_DB: who_that
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U who_that -d who_that"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PORT: 5050
      DATABASE_URL: postgresql://who_that:who_that_dev@localhost:5432/who_that
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v6

      - name: Verify e2e env vars are set
        run: |
          missing=()
          [ -z "$SUPABASE_URL" ] && missing+=("SUPABASE_URL (repo variable)")
          [ -z "$SUPABASE_ANON_KEY" ] && missing+=("SUPABASE_ANON_KEY (repo secret)")
          [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] && missing+=("SUPABASE_SERVICE_ROLE_KEY (repo secret)")
          [ -z "$SUPABASE_JWT_SECRET" ] && missing+=("SUPABASE_JWT_SECRET (repo secret)")
          [ -z "$OPENAI_API_KEY" ] && missing+=("OPENAI_API_KEY (repo secret)")
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing required env for e2e:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            echo "Set these under Settings -> Secrets and variables -> Actions." >&2
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Enable pgvector extension on e2e database
        run: PGPASSWORD=who_that_dev psql -h localhost -U who_that -d who_that -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Apply migrations to e2e database
        run: npm run db:migrate

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npx playwright test
