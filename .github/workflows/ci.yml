name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: who_that
          POSTGRES_PASSWORD: who_that_dev
          POSTGRES_DB: who_that
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U who_that -d who_that"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://who_that:who_that_dev@localhost:5432/who_that
      TEST_DATABASE_URL: postgresql://who_that:who_that_dev@localhost:5432/who_that_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Create test database
        run: PGPASSWORD=who_that_dev psql -h localhost -U who_that -d postgres -c "CREATE DATABASE who_that_test;"

      - run: npm ci

      - run: npm run check

      - run: npm test
